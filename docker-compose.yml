services:
  cloakbrowser:
    image: cloakhq/cloakbrowser:latest
    container_name: cloakbrowser-9222
    command: ["cloakserve", "--headless"]
    restart: unless-stopped
    # Bind to loopback only — the stealth browser must NOT be internet-facing.
    # Override host port if 9222 is taken:  CLOAK_PORT=9333 docker compose up -d
    ports:
      - "${CLOAK_PORT:-127.0.0.1:9222}:9222"
    environment:
      - DISPLAY=:99
      # Optional: fetch Widevine CDM on first boot (needed for some DRM video).
      # - CLOAKBROWSER_FETCH_WIDEVINE=1
    shm_size: "2gb"
    # Uncomment to pin a specific arch / version:
    # platform: linux/arm64
